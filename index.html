<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paddeltennis Turnering 🎾</title>
  <style>
    :root {
      --green: #2d7a3a;
      --green-light: #4caf50;
      --green-pale: #e8f5e9;
      --yellow: #f9c23c;
      --gray: #f5f5f5;
      --text: #1a1a1a;
      --muted: #666;
      --border: #ddd;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--green-pale); color: var(--text); min-height: 100vh; }
    header { background: var(--green); color: white; padding: 24px 20px 20px; text-align: center; }
    header h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; }
    header p { margin-top: 6px; opacity: 0.85; font-size: 0.95rem; }
    .badge { display: inline-block; background: var(--yellow); color: #333; font-size: 0.78rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-top: 10px; }
    main { max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; }
    .card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; margin-bottom: 20px; }
    .card h2 { font-size: 1.1rem; font-weight: 700; color: var(--green); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field.full { grid-column: 1 / -1; }
    label { font-size: 0.82rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
    input, select { border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 0.95rem; font-family: inherit; transition: border-color 0.15s; background: white; }
    input:focus, select:focus { outline: none; border-color: var(--green-light); }
    .level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .level-option { position: relative; }
    .level-option input[type="radio"] { position: absolute; opacity: 0; width: 0; }
    .level-option label { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; border: 2px solid var(--border); border-radius: 10px; padding: 10px 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600; text-transform: none; letter-spacing: 0; color: var(--text); transition: all 0.15s; background: var(--gray); }
    .level-option input[type="radio"]:checked + label { border-color: var(--green-light); background: var(--green-pale); color: var(--green); }
    .level-option label span.emoji { font-size: 1.3rem; }
    .btn { width: 100%; padding: 13px; background: var(--green); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.15s, transform 0.1s; margin-top: 8px; }
    .btn:hover { background: #256030; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #aaa; cursor: not-allowed; transform: none; }
    .btn-secondary { background: white; color: var(--green); border: 2px solid var(--green); margin-top: 10px; }
    .btn-secondary:hover { background: var(--green-pale); }
    .count-bar { display: flex; align-items: center; justify-content: space-between; background: var(--green-pale); border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 0.9rem; }
    .count-bar strong { color: var(--green); font-size: 1.1rem; }
    .participant-list { display: flex; flex-direction: column; gap: 8px; }
    .participant { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--gray); }
    .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.95rem; flex-shrink: 0; color: white; }
    .participant-info { flex: 1; }
    .participant-name { font-weight: 700; font-size: 0.92rem; }
    .participant-meta { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .level-tag { font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; flex-shrink: 0; }
    .tag-ny { background: #e3f2fd; color: #1565c0; }
    .tag-begynder { background: #fff3e0; color: #e65100; }
    .tag-øvet { background: #e8f5e9; color: #2e7d32; }
    .delete-btn { background: none; border: none; cursor: pointer; font-size: 1rem; color: #bbb; padding: 4px; border-radius: 6px; transition: color 0.15s; }
    .delete-btn:hover { color: #e53935; }
    .teams-grid { display: flex; flex-direction: column; gap: 12px; }
    .team-card { border: 2px solid var(--border); border-radius: 10px; overflow: hidden; }
    .team-header { padding: 8px 14px; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: white; }
    .team-members { padding: 10px 14px; display: flex; flex-direction: column; gap: 6px; }
    .team-member { font-size: 0.88rem; display: flex; align-items: center; gap: 8px; }
    .matches-list { display: flex; flex-direction: column; gap: 10px; }
    .match { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--gray); }
    .match-team { font-size: 0.85rem; font-weight: 600; text-align: center; }
    .match-vs { font-size: 0.75rem; font-weight: 800; color: var(--muted); text-align: center; }
    .match-num { font-size: 0.68rem; color: var(--muted); font-weight: 600; margin-bottom: 4px; text-align: center; }
    .empty-state { text-align: center; color: var(--muted); padding: 24px 0; font-size: 0.9rem; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #333; color: white; padding: 12px 20px; border-radius: 30px; font-size: 0.88rem; font-weight: 600; transition: transform 0.3s ease; z-index: 999; pointer-events: none; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .tabs { display: flex; border-radius: 10px; overflow: hidden; border: 1.5px solid var(--border); margin-bottom: 16px; }
    .tab { flex: 1; padding: 9px 8px; background: white; border: none; cursor: pointer; font-size: 0.82rem; font-weight: 600; color: var(--muted); transition: all 0.15s; }
    .tab:not(:last-child) { border-right: 1.5px solid var(--border); }
    .tab.active { background: var(--green); color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .info-box { background: var(--green-pale); border-left: 3px solid var(--green-light); border-radius: 6px; padding: 10px 12px; font-size: 0.82rem; color: var(--green); margin-bottom: 14px; }
    .connection-bar { font-size: 0.75rem; color: var(--muted); text-align: center; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
    .status-dot.connected { background: #4caf50; }
    .status-dot.error { background: #e53935; }
    .link-row { display: flex; gap: 8px; align-items: center; background: var(--gray); border: 1.5px solid var(--border); border-radius: 8px; padding: 9px 12px; margin-top: 8px; font-size: 0.82rem; word-break: break-all; color: var(--muted); }
    .copy-btn { background: var(--green); color: white; border: none; border-radius: 6px; padding: 5px 10px; font-size: 0.75rem; font-weight: 700; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  </style>
</head>
<body>

<header>
  <h1>🎾 Paddeltennis Turnering</h1>
  <p>Lørdag kl. 12:00</p>
  <span class="badge">Tilmeld dig herunder</span>
</header>

<main>
  <div class="card">
    <h2>📋 Tilmelding</h2>
    <div class="connection-bar">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Forbinder...</span>
    </div>
    <form id="signupForm">
      <div class="form-row">
        <div class="field">
          <label>Navn *</label>
          <input type="text" id="navn" placeholder="Dit fulde navn" required />
        </div>
        <div class="field">
          <label>Alder *</label>
          <input type="number" id="alder" placeholder="F.eks. 25" min="5" max="99" required />
        </div>
      </div>
      <div class="field" style="margin-top:12px;">
        <label>Niveau *</label>
        <div class="level-grid">
          <div class="level-option">
            <input type="radio" name="niveau" id="ny" value="Ny" required />
            <label for="ny"><span class="emoji">🌱</span>Ny</label>
          </div>
          <div class="level-option">
            <input type="radio" name="niveau" id="begynder" value="Begynder" />
            <label for="begynder"><span class="emoji">🎯</span>Begynder</label>
          </div>
          <div class="level-option">
            <input type="radio" name="niveau" id="øvet" value="Øvet" />
            <label for="øvet"><span class="emoji">⚡</span>Øvet</label>
          </div>
        </div>
      </div>
      <div class="field full" style="margin-top:12px;">
        <label>Ønsket makker (valgfrit)</label>
        <input type="text" id="makker" placeholder="Navn på ønsket makker" />
      </div>
      <button type="submit" class="btn" id="submitBtn">✅ Tilmeld mig</button>
    </form>
  </div>

  <div class="card">
    <div class="count-bar">
      <span>Tilmeldte</span>
      <strong id="countDisplay">0 deltagere</strong>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('liste',this)">👥 Deltagere</button>
      <button class="tab" onclick="switchTab('hold',this)">🏆 Hold</button>
      <button class="tab" onclick="switchTab('kampe',this)">📅 Kampe</button>
    </div>

    <div id="tab-liste" class="tab-content active">
      <div id="participantList" class="participant-list">
        <div class="empty-state">Ingen tilmeldte endnu 🎾</div>
      </div>
      <button class="btn btn-secondary" onclick="exportCSV()" style="margin-top:12px;">📥 Download tilmeldingsliste</button>
      <div style="margin-top:16px;">
        <label style="font-size:0.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;">Del dette link med alle</label>
        <div class="link-row">
          <span id="shareUrl" style="flex:1;">—</span>
          <button class="copy-btn" onclick="copyLink()">Kopiér</button>
        </div>
      </div>
    </div>

    <div id="tab-hold" class="tab-content">
      <div class="info-box">Hold dannes tilfældigt — makkerønsker respekteres automatisk.</div>
      <button class="btn" onclick="generateTeams()">🎲 Generer tilfældige hold</button>
      <div id="teamsList" style="margin-top:14px;"></div>
    </div>

    <div id="tab-kampe" class="tab-content">
      <div class="info-box">Generér hold først — så laves kampplanen automatisk.</div>
      <div id="matchesList" class="matches-list">
        <div class="empty-state">Generer hold for at se kampplanen</div>
      </div>
    </div>
  </div>
</main>

<div id="toast" class="toast"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getDatabase, ref, push, remove, onValue, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAQdz4isoox_PN1I2JFwHYucT_V-ADeWf0",
    authDomain: "padelturnering-2026.firebaseapp.com",
    projectId: "padelturnering-2026",
    databaseURL: "https://padelturnering-2026-default-rtdb.europe-west1.firebasedatabase.app",
    appId: "1:969737094586:web:f403c6ff854ef870838983"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  const colors = ['#2d7a3a','#1565c0','#6a1b9a','#c62828','#e65100','#00695c','#4527a0','#ad1457','#37474f','#558b2f'];
  let participants = [];
  let currentTeams = [];

  // ── Status ─────────────────────────────────────────────────────────────────
  function setStatus(state, msg) {
    document.getElementById('statusDot').className = 'status-dot' + (state==='connected'?' connected':state==='error'?' error':'');
    document.getElementById('statusText').textContent = msg;
  }

  // Update share URL
  document.getElementById('shareUrl').textContent = location.href;

  // ── Live listener ──────────────────────────────────────────────────────────
  setStatus('connecting','Forbinder...');
  onValue(ref(db,'deltagere'), snap => {
    participants = [];
    snap.forEach(child => { participants.push({ _key: child.key, ...child.val() }); });
    render();
    setStatus('connected', 'Forbundet · ' + participants.length + ' tilmeldt');
  }, err => setStatus('error','Fejl: ' + err.message));

  // ── Form ───────────────────────────────────────────────────────────────────
  document.getElementById('signupForm').addEventListener('submit', async e => {
    e.preventDefault();
    const navn   = document.getElementById('navn').value.trim();
    const alder  = parseInt(document.getElementById('alder').value);
    const niveau = document.querySelector('input[name="niveau"]:checked')?.value;
    const makker = document.getElementById('makker').value.trim();
    if (!navn || !alder || !niveau) return;
    if (participants.find(p => p.navn.toLowerCase() === navn.toLowerCase())) {
      return showToast('⚠️ ' + navn + ' er allerede tilmeldt');
    }
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = 'Gemmer...';
    try {
      await push(ref(db,'deltagere'), { navn, alder, niveau, makker, _ts: serverTimestamp() });
      e.target.reset();
      showToast('🎾 ' + navn + ' er tilmeldt!');
    } catch(err) { showToast('❌ ' + err.message); }
    btn.disabled = false; btn.textContent = '✅ Tilmeld mig';
  });

  // ── Delete ─────────────────────────────────────────────────────────────────
  window.removeParticipant = async key => {
    await remove(ref(db,'deltagere/' + key));
    showToast('Deltager fjernet');
  };

  // ── Render ─────────────────────────────────────────────────────────────────
  function render() {
    const list  = document.getElementById('participantList');
    const count = document.getElementById('countDisplay');
    count.textContent = participants.length + ' deltager' + (participants.length !== 1 ? 'e' : '');
    if (!participants.length) { list.innerHTML = '<div class="empty-state">Ingen tilmeldte endnu 🎾</div>'; return; }
    list.innerHTML = participants.map((p,i) => {
      const init = p.navn.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
      const col  = colors[i % colors.length];
      const tag  = {Ny:'tag-ny',Begynder:'tag-begynder',Øvet:'tag-øvet'}[p.niveau]||'tag-ny';
      return `<div class="participant">
        <div class="avatar" style="background:${col}">${init}</div>
        <div class="participant-info">
          <div class="participant-name">${p.navn}</div>
          <div class="participant-meta">${p.alder} år${p.makker?' · Ønsker: '+p.makker:''}</div>
        </div>
        <span class="level-tag ${tag}">${p.niveau}</span>
        <button class="delete-btn" onclick="removeParticipant('${p._key}')" title="Fjern">✕</button>
      </div>`;
    }).join('');
  }

  // ── Teams ──────────────────────────────────────────────────────────────────
  function shuffle(a) {
    const b = [...a];
    for (let i=b.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; }
    return b;
  }

  window.generateTeams = () => {
    if (participants.length < 2) return showToast('⚠️ Mindst 2 deltagere kræves');
    let assigned = new Set(), teams = [], pool = shuffle([...participants]);
    pool.forEach(p => {
      if (assigned.has(p.navn)) return;
      const wish = p.makker ? participants.find(q =>
        q.navn.toLowerCase().includes(p.makker.toLowerCase()) && !assigned.has(q.navn) && q.navn!==p.navn) : null;
      if (wish) { teams.push([p,wish]); assigned.add(p.navn); assigned.add(wish.navn); }
    });
    pool.forEach(p => { if (!assigned.has(p.navn)) { teams.push([p]); assigned.add(p.navn); } });
    let i=0;
    while (i < teams.length) {
      if (teams[i].length === 1) {
        const next = teams.findIndex((t,j)=>j>i&&t.length===1);
        if (next !== -1) { teams[i]=[teams[i][0],teams[next][0]]; teams.splice(next,1); }
      } i++;
    }
    currentTeams = teams;
    renderTeams(); renderMatches();
    showToast('🎲 Hold genereret!');
    switchTab('hold', document.querySelectorAll('.tab')[1]);
  };

  function renderTeams() {
    const el = document.getElementById('teamsList');
    if (!currentTeams.length) { el.innerHTML='<div class="empty-state">Ingen hold endnu</div>'; return; }
    el.innerHTML = '<div class="teams-grid">' + currentTeams.map((team,i)=>`
      <div class="team-card">
        <div class="team-header" style="background:${colors[i%colors.length]}">Hold ${i+1}</div>
        <div class="team-members">
          ${team.map(p=>`<div class="team-member"><span>👤</span><span><strong>${p.navn}</strong> · ${p.alder} år · ${p.niveau}</span></div>`).join('')}
          ${team.length===1?'<div style="font-size:0.78rem;color:#999;margin-top:4px;">⚠️ Mangler makker</div>':''}
        </div>
      </div>`).join('') + '</div>';
  }

  function renderMatches() {
    const el = document.getElementById('matchesList');
    if (currentTeams.length < 2) { el.innerHTML='<div class="empty-state">Generer hold for at se kampplanen</div>'; return; }
    let matches=[];
    for(let i=0;i<currentTeams.length;i++) for(let j=i+1;j<currentTeams.length;j++) matches.push([i,j]);
    el.innerHTML = matches.map(([a,b])=>{
      const n1=currentTeams[a].map(p=>p.navn.split(' ')[0]).join(' & ');
      const n2=currentTeams[b].map(p=>p.navn.split(' ')[0]).join(' & ');
      return `<div class="match">
        <div><div class="match-num">Hold ${a+1}</div><div class="match-team">${n1}</div></div>
        <div class="match-vs">VS</div>
        <div><div class="match-num">Hold ${b+1}</div><div class="match-team">${n2}</div></div>
      </div>`;
    }).join('');
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  window.switchTab = (name, btn) => {
    document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
    document.getElementById('tab-'+name).classList.add('active');
    if (btn) btn.classList.add('active');
  };

  window.exportCSV = () => {
    if (!participants.length) return showToast('Ingen deltagere');
    const rows=[['Navn','Alder','Niveau','Ønsket makker'],...participants.map(p=>[p.navn,p.alder,p.niveau,p.makker||''])];
    const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'}));
    a.download='padel_tilmeldinger.csv'; a.click();
  };

  window.copyLink = () => navigator.clipboard.writeText(location.href).then(()=>showToast('🔗 Link kopieret!'));

  function showToast(msg) {
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2500);
  }
</script>
</body>
</html>
